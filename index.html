<!doctype html>
<html lang="fr" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Miira.Eco</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes leafFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(5deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .leaf-animate {
      animation: leafFloat 4s ease-in-out infinite;
    }
    .dot-pulse {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="w-full h-full flex items-center justify-center" style="background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #d1fae5 100%);">
   <div class="text-center p-8">
    <!-- Logo Principal -->
    <div class="flex flex-col items-center gap-6">
     <!-- Icône du logo -->
     <div class="relative">
      <svg width="120" height="120" viewbox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
       <!-- Cercle de fond avec dégradé --> <defs>
        <lineargradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
         <stop offset="0%" style="stop-color:#10b981" />
         <stop offset="100%" style="stop-color:#059669" />
        </lineargradient>
        <lineargradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
         <stop offset="0%" style="stop-color:#34d399" />
         <stop offset="100%" style="stop-color:#10b981" />
        </lineargradient>
       </defs> <!-- Cercle principal --> <circle cx="60" cy="60" r="55" fill="url(#bgGradient)" opacity="0.15" /> <circle cx="60" cy="60" r="45" fill="url(#bgGradient)" opacity="0.25" /> <!-- Feuille stylisée - forme de M abstrait --> <g class="leaf-animate" style="transform-origin: center;">
        <!-- Première feuille (gauche) -->
        <path d="M35 75 Q35 45 50 35 Q55 50 50 70 Q45 80 35 75Z" fill="url(#leafGradient)" /> <!-- Deuxième feuille (centre-gauche) -->
        <path d="M48 78 Q50 40 60 28 Q65 45 62 72 Q58 82 48 78Z" fill="#10b981" /> <!-- Troisième feuille (centre-droit) -->
        <path d="M58 78 Q60 40 70 28 Q75 45 72 72 Q68 82 58 78Z" fill="url(#leafGradient)" /> <!-- Quatrième feuille (droite) -->
        <path d="M70 75 Q85 45 85 35 Q80 50 82 70 Q78 80 70 75Z" fill="#10b981" />
       </g> <!-- Petits cercles décoratifs (gouttes d'eau/rosée) --> <circle cx="42" cy="55" r="3" fill="#6ee7b7" class="dot-pulse" /> <circle cx="78" cy="52" r="2.5" fill="#6ee7b7" class="dot-pulse" style="animation-delay: 0.5s;" /> <circle cx="60" cy="42" r="2" fill="#a7f3d0" class="dot-pulse" style="animation-delay: 1s;" />
      </svg>
     </div><!-- Texte du logo -->
     <div class="flex flex-col items-center">
      <div class="flex items-baseline gap-0">
       <span id="brand-name" class="text-5xl font-bold tracking-tight" style="font-family: 'Quicksand', sans-serif; color: #065f46;"> Miira </span> <span id="brand-dot" class="text-5xl font-bold dot-pulse" style="font-family: 'Quicksand', sans-serif; color: #10b981;">.</span> <span id="brand-eco" class="text-5xl font-semibold" style="font-family: 'Quicksand', sans-serif; color: #10b981;">Eco</span>
      </div><!-- Slogan -->
      <p id="tagline" class="mt-3 text-lg tracking-widest uppercase" style="font-family: 'Quicksand', sans-serif; color: #059669; letter-spacing: 0.25em;">Pour un avenir durable</p>
     </div><!-- Ligne décorative -->
     <div class="flex items-center gap-3 mt-2">
      <div class="h-px w-16 bg-gradient-to-r from-transparent to-emerald-400"></div>
      <svg width="12" height="12" viewbox="0 0 12 12" fill="none">
       <path d="M6 0 Q8 4 6 8 Q4 4 6 0Z" fill="#10b981" />
      </svg>
      <div class="h-px w-16 bg-gradient-to-l from-transparent to-emerald-400"></div>
     </div><!-- Bouton de messagerie --> <button id="message-btn" class="mt-8 px-8 py-3 rounded-full font-semibold text-white shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-200" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); font-family: 'Quicksand', sans-serif;"> 💬 Discuter avec nous </button>
     <p class="text-sm text-emerald-600 mt-2" style="font-family: 'Quicksand', sans-serif;">Nous répondons généralement en moins d'une heure</p>
    </div><!-- Variantes du logo (miniatures) -->
    <div class="mt-12 flex justify-center gap-8">
     <!-- Version compacte -->
     <div class="flex flex-col items-center gap-2 p-4 rounded-2xl" style="background: rgba(255,255,255,0.7);">
      <svg width="50" height="50" viewbox="0 0 120 120" fill="none">
       <circle cx="60" cy="60" r="50" fill="#10b981" /> <g fill="white">
        <path d="M35 75 Q35 45 50 35 Q55 50 50 70 Q45 80 35 75Z" />
        <path d="M48 78 Q50 40 60 28 Q65 45 62 72 Q58 82 48 78Z" opacity="0.8" />
        <path d="M58 78 Q60 40 70 28 Q75 45 72 72 Q68 82 58 78Z" />
        <path d="M70 75 Q85 45 85 35 Q80 50 82 70 Q78 80 70 75Z" opacity="0.8" />
       </g>
      </svg><span class="text-xs text-emerald-700" style="font-family: 'Quicksand', sans-serif;">Icône</span>
     </div><!-- Version monochrome -->
     <div class="flex flex-col items-center gap-2 p-4 rounded-2xl" style="background: rgba(255,255,255,0.7);">
      <div class="flex items-baseline">
       <span class="text-2xl font-bold" style="font-family: 'Quicksand', sans-serif; color: #065f46;">Miira</span> <span class="text-2xl font-bold" style="font-family: 'Quicksand', sans-serif; color: #065f46;">.</span> <span class="text-2xl font-semibold" style="font-family: 'Quicksand', sans-serif; color: #065f46;">Eco</span>
      </div><span class="text-xs text-emerald-700" style="font-family: 'Quicksand', sans-serif;">Texte</span>
     </div><!-- Version sombre -->
     <div class="flex flex-col items-center gap-2 p-4 rounded-2xl" style="background: #065f46;">
      <div class="flex items-baseline">
       <span class="text-2xl font-bold" style="font-family: 'Quicksand', sans-serif; color: #ffffff;">Miira</span> <span class="text-2xl font-bold" style="font-family: 'Quicksand', sans-serif; color: #6ee7b7;">.</span> <span class="text-2xl font-semibold" style="font-family: 'Quicksand', sans-serif; color: #6ee7b7;">Eco</span>
      </div><span class="text-xs text-emerald-300" style="font-family: 'Quicksand', sans-serif;">Fond sombre</span>
     </div>
    </div>
   </div>
  </div><!-- Modal de messagerie -->
  <div id="message-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" style="z-index: 1000;">
   <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6" style="max-height: 90vh; overflow-y-auto;">
    <div class="flex justify-between items-center mb-4">
     <h2 class="text-2xl font-bold" style="font-family: 'Quicksand', sans-serif; color: #065f46;">Nous contacter</h2><button id="close-modal" class="text-gray-500 hover:text-gray-700 text-2xl">×</button>
    </div>
    <form id="contact-form" class="space-y-4">
     <div><label for="name" class="block text-sm font-semibold mb-2" style="color: #065f46; font-family: 'Quicksand', sans-serif;">Nom</label> <input type="text" id="name" name="name" required class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none focus:border-emerald-500" style="border-color: #d1fae5; font-family: 'Quicksand', sans-serif;" placeholder="Votre nom">
     </div>
     <div><label for="phone" class="block text-sm font-semibold mb-2" style="color: #065f46; font-family: 'Quicksand', sans-serif;">Numéro de téléphone</label> <input type="tel" id="phone" name="phone" required class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none focus:border-emerald-500" style="border-color: #d1fae5; font-family: 'Quicksand', sans-serif;" placeholder="+33 6 XX XX XX XX">
     </div>
     <div><label for="product_name" class="block text-sm font-semibold mb-2" style="color: #065f46; font-family: 'Quicksand', sans-serif;">Nom du produit</label> <input type="text" id="product_name" name="product_name" required class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none focus:border-emerald-500" style="border-color: #d1fae5; font-family: 'Quicksand', sans-serif;" placeholder="Ex: Miira Eco Pro...">
     </div>
     <div><label for="message" class="block text-sm font-semibold mb-2" style="color: #065f46; font-family: 'Quicksand', sans-serif;">Message</label> <textarea id="message" name="message" required rows="4" class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none focus:border-emerald-500 resize-none" style="border-color: #d1fae5; font-family: 'Quicksand', sans-serif;" placeholder="Votre message..."></textarea>
     </div><button type="submit" class="w-full py-3 rounded-lg font-semibold text-white transition-all duration-200 hover:shadow-lg" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); font-family: 'Quicksand', sans-serif;"> Envoyer le message </button>
     <div id="form-message" class="text-center text-sm p-2 rounded hidden" style="font-family: 'Quicksand', sans-serif;"></div>
    </form>
   </div>
  </div>
  <script>
    const defaultConfig = {
      tagline: "Pour un avenir durable",
      background_color: "#f0fdf4",
      primary_color: "#065f46",
      accent_color: "#10b981",
      font_family: "Quicksand",
      font_size: 16
    };

    let config = { ...defaultConfig };

    async function onConfigChange(cfg) {
      config = { ...defaultConfig, ...cfg };
      
      // Update tagline
      const taglineEl = document.getElementById('tagline');
      if (taglineEl) {
        taglineEl.textContent = config.tagline || defaultConfig.tagline;
      }
      
      // Update colors
      const brandName = document.getElementById('brand-name');
      const brandDot = document.getElementById('brand-dot');
      const brandEco = document.getElementById('brand-eco');
      
      if (brandName) brandName.style.color = config.primary_color;
      if (brandDot) brandDot.style.color = config.accent_color;
      if (brandEco) brandEco.style.color = config.accent_color;
      if (taglineEl) taglineEl.style.color = config.accent_color;
      
      // Update font
      const fontFamily = config.font_family || defaultConfig.font_family;
      document.querySelectorAll('[style*="font-family"]').forEach(el => {
        el.style.fontFamily = `${fontFamily}, sans-serif`;
      });
    }

    function mapToCapabilities(cfg) {
      return {
        recolorables: [
          {
            get: () => cfg.background_color || defaultConfig.background_color,
            set: (value) => {
              cfg.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => cfg.primary_color || defaultConfig.primary_color,
            set: (value) => {
              cfg.primary_color = value;
              window.elementSdk.setConfig({ primary_color: value });
            }
          },
          {
            get: () => cfg.accent_color || defaultConfig.accent_color,
            set: (value) => {
              cfg.accent_color = value;
              window.elementSdk.setConfig({ accent_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => cfg.font_family || defaultConfig.font_family,
          set: (value) => {
            cfg.font_family = value;
            window.elementSdk.setConfig({ font_family: value });
          }
        },
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(cfg) {
      return new Map([
        ["tagline", cfg.tagline || defaultConfig.tagline]
      ]);
    }

    // SDK initialization not needed for standalone deployment

    // Gestion du modal de messagerie
    const messageBtn = document.getElementById('message-btn');
    const messageModal = document.getElementById('message-modal');
    const closeModal = document.getElementById('close-modal');
    const contactForm = document.getElementById('contact-form');
    const formMessage = document.getElementById('form-message');

    messageBtn.addEventListener('click', () => {
      messageModal.classList.remove('hidden');
    });

    closeModal.addEventListener('click', () => {
      messageModal.classList.add('hidden');
      contactForm.reset();
      formMessage.classList.add('hidden');
    });

    messageModal.addEventListener('click', (e) => {
      if (e.target === messageModal) {
        messageModal.classList.add('hidden');
        contactForm.reset();
        formMessage.classList.add('hidden');
      }
    });

    contactForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const productName = document.getElementById('product_name').value;
      const message = document.getElementById('message').value;

      // Afficher le message de chargement
      formMessage.style.backgroundColor = '#d1fae5';
      formMessage.style.color = '#065f46';
      formMessage.textContent = '⏳ Envoi en cours...';
      formMessage.classList.remove('hidden');

      try {
        // Envoyer à Formspree
        const response = await fetch('https://formspree.io/f/mzdjpjwq', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            name: name,
            phone: phone,
            product_name: productName,
            message: message
          })
        });

        if (response.ok) {
          // Afficher le message de succès
          formMessage.style.backgroundColor = '#d1fae5';
          formMessage.style.color = '#065f46';
          formMessage.textContent = '✓ Merci ! Votre message a été envoyé. Nous vous répondrons bientôt.';
          
          // Réinitialiser le formulaire après 2 secondes et fermer
          setTimeout(() => {
            contactForm.reset();
            messageModal.classList.add('hidden');
            formMessage.classList.add('hidden');
          }, 2000);
        } else {
          throw new Error('Erreur lors de l\'envoi');
        }
      } catch (error) {
        // Afficher le message d'erreur
        formMessage.style.backgroundColor = '#fee2e2';
        formMessage.style.color = '#991b1b';
        formMessage.textContent = '✗ Erreur lors de l\'envoi. Veuillez réessayer.';
      }
    });
  </script>
